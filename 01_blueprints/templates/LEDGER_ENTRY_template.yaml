# ==============================================================================
# ENGINE CORE: GLOBAL HISTORY LEDGER ENTRY TEMPLATE
# Parsed, populated, and appended exclusively by the Librarian kernel.
# ==============================================================================

- transaction_id: "TX_YYYY_XXXXX"       # Continuous incremental sequence ID (e.g., TX_2026_00001)
  timestamp: "YYYY-MM-DDTHH:MM:SSZ"     # Exact ISO-8601 system time of disk write
  event_type: "[CREATION | SUPERSESSION | DEPRECATION | TQUERY_RESOLUTION]"
  
  root_causality:
    originating_agent: "[AGENT_ROLE]"   # The structural agent that initiated the change
    target_branch: "proposal/[DOC_ID]"  # Sandboxed branch where work occurred
  
  artifact_state:
    id: "[DOC_ID]"                      # e.g., BDR_010, BREQ_012
    file_path: "/governance/[dir]/[filename].md"
    current_status: "[DRAFT | REVIEW | AUTHORIZED | DEPRECATED]"
  
  traceability_chain:
    supersedes_file_id: null            # ID of the stale document being replaced (or null)
    supersedes_file_path: null          # Path to the old document moved to rollbacks (or null)
    change_justification: |
      [Provide a concise explanation detailing why this change, update, or deprecation occurred.]
  
  hitl_authorization:
    hitl_signatory_identity: "[HUMAN_NAME via INTERFACE_METHOD]" # Clean, plain-text human signature
    tquery_reference: null               # Link to TQ_XXX sequential ID if resolving a block (or null)